{% extends 'tasks/layout.html' %}

{% block body %}
    <h1>EDIT TASK</h1>
    <form action="{% url 'edit' task.id %}" method="post">
        {% csrf_token %}

        <label>Title</label><br>
        <input type="text" name="title" value="{{ task.title }}"><br><br>

        <label>Description</label><br>
        <textarea name="description">{{ task.description }}</textarea><br><br>

        <label>Due Date</label><br>
        <input type="datetime-local" name="due_date"><br><br>

        <label>Completed</label>
        <input type="checkbox" name="completed" {% if task.completed %}checked{% endif %}><br><br>

        <button type="submit">Save Changes</button>

    </form>
    <br>
    <a href="{% url 'home' %}">[View Changes]</a>


{% endblock %}
